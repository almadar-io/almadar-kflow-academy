<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Center core -->
  <circle cx="16" cy="16" r="3" fill="white"/>
  
  <!-- Inner orbit -->
  <circle cx="14" cy="14" r="8" stroke="white" stroke-width="1.5" fill="none" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="12s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Outer orbit -->
  <circle cx="18" cy="18" r="10" stroke="white" stroke-width="1.5" fill="none" opacity="0.6">
    <animateTransform attributeName="transform" type="rotate" from="360 16 16" to="0 16 16" dur="16s" repeatCount="indefinite"/>
  </circle>
</svg>
