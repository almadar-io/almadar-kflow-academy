# Firebase App Hosting configuration for KFlow Academy
# Backend: kflow-academy-server
# URL: https://kflow-academy-server--kflow-b3a39.us-central1.hosted.app

# Build configuration
build:
  command: npm install && npm run build:server

# Run configuration  
run:
  runtime: nodejs22
  command: node packages/server/dist/server.js

runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # GitHub token for @almadar-io private packages from GitHub Packages
  - variable: GITHUB_TOKEN
    secret: GH_PACKAGES_TOKEN
    availability:
      - BUILD

  # Use development during build to install devDependencies
  - variable: NODE_ENV
    value: development
    availability:
      - BUILD

  # Use production at runtime
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME

  # CORS configuration
  - variable: CORS_ORIGINS
    value: "https://kflow-b3a39.web.app,https://kflow-b3a39.firebaseapp.com,https://kflow.academy,https://www.kflow.academy,https://kflow-dev.web.app,https://kflow-dev.firebaseapp.com"
    availability:
      - RUNTIME

  # Firebase Admin SDK credentials (from Cloud Secret Manager)
  - variable: FB_PROJECT_ID
    secret: FIREBASE_PROJECT_ID

  - variable: FB_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL

  - variable: FB_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY

  - variable: FB_DB_ID
    value: kflow
    availability:
      - RUNTIME

  # Redis cache (optional — falls back to in-memory when absent)
  - variable: REDIS_URL
    secret: REDIS_URL
    availability:
      - RUNTIME

  # Upstash REST API (optional — for future REST-based cache access)
  - variable: UPSTASH_REDIS_REST_URL
    value: "https://capital-skunk-81313.upstash.io"
    availability:
      - RUNTIME

  - variable: UPSTASH_REDIS_REST_TOKEN
    secret: UPSTASH_REDIS_REST_TOKEN
    availability:
      - RUNTIME

  # LLM API Keys (from Cloud Secret Manager)
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY

  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY

  - variable: DEEPSEEK_API_KEY
    secret: DEEPSEEK_API_KEY

  # Almadar SDK credentials — used by /api/generate-interactive-orbital
  # to call the Builder Studio agent endpoint.
  - variable: ALMADAR_API_KEY
    secret: ALMADAR_API_KEY

  - variable: ALMADAR_BASE_URL
    value: "https://studio.almadar.io"
    availability:
      - RUNTIME
