name: Deploy Client to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'packages/client/**'
      - '.github/workflows/deploy-firebase.yml'
  workflow_dispatch:

env:
  # Pinned to 20 LTS: Node 22.23.x's bundled undici premature-closes firebase-tools'
  # OAuth token exchange ("Failed to authenticate"); gcloud + curl over the same network succeed.
  NODE_VERSION: '20'
  FIREBASE_PROJECT: 'kflow-b3a39'

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $HOME/gcloud-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-service-account.json" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          pnpm install --no-frozen-lockfile
        env:
          NODE_ENV: development
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Client
        run: pnpm run build:client
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Deploy Client to Firebase Hosting
        # firebase-tools' OAuth token exchange premature-closes on the runner's flaky IPv6
        # path (curl + gcloud over IPv4 succeed). Force Node to prefer IPv4; retry as a backstop.
        env:
          NODE_OPTIONS: '--dns-result-order=ipv4first'
        run: |
          for attempt in 1 2 3 4 5; do
            if firebase deploy --only hosting:prod --project ${{ env.FIREBASE_PROJECT }} --non-interactive; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "::warning::Deploy attempt $attempt failed; retrying in 15s..."
            sleep 15
          done
          echo "::error::Deploy failed after 5 attempts"
          exit 1
