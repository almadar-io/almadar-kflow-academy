name: Deploy Client to Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'packages/client/**'
      - '.github/workflows/deploy-firebase.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  FIREBASE_PROJECT: 'kflow-b3a39'

jobs:
  deploy:
    name: Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $HOME/gcloud-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/gcloud-service-account.json" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
        env:
          NODE_ENV: development
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Build Client
        run: npm run build:client
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Diagnose token-endpoint connectivity
        run: |
          echo "--- raw TLS reachability to oauth2 endpoints ---"
          curl -s -o /dev/null -w "www.googleapis.com/oauth2/v4/token -> HTTP %{http_code} (time %{time_total}s)\n" https://www.googleapis.com/oauth2/v4/token || echo "curl www FAILED"
          curl -s -o /dev/null -w "oauth2.googleapis.com/token       -> HTTP %{http_code} (time %{time_total}s)\n" https://oauth2.googleapis.com/token || echo "curl oauth2 FAILED"
          echo "--- gcloud SA activation + token mint (independent HTTP stack) ---"
          if gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS" 2>&1; then
            if TOK=$(gcloud auth print-access-token 2>&1); then
              echo "gcloud token mint OK (len=${#TOK})"
            else
              echo "gcloud token mint FAILED: $TOK"
            fi
          else
            echo "gcloud SA activation FAILED"
          fi

      - name: Deploy Client to Firebase Hosting
        # Retry: the SA token exchange at googleapis.com/oauth2/v4/token intermittently
        # drops mid-response ("Premature close"), which firebase reports as an auth failure.
        run: |
          for attempt in 1 2 3 4 5; do
            if firebase deploy --only hosting:prod --project ${{ env.FIREBASE_PROJECT }} --non-interactive; then
              echo "Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "::warning::Deploy attempt $attempt failed; retrying in 15s..."
            sleep 15
          done
          echo "::error::Deploy failed after 5 attempts"
          exit 1
